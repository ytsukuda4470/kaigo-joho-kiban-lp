name: 管理サイト自動デプロイ

on:
  push:
    branches: ["main"]
    paths:
      - "firebase-app/public/**"
      - "firebase-app/functions/**"
      - "firebase-app/firebase.json"
      - "firebase-app/firestore.rules"
      - "firebase-app/firestore.indexes.json"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: "Functions もデプロイする（シークレット設定済みの場合のみ）"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: firebase-app/functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions dependencies
        run: npm ci
        working-directory: firebase-app/functions

      - name: Deploy Hosting & Firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN が未設定です"
            exit 1
          fi
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:admin,firestore \
            --token "$FIREBASE_TOKEN" --non-interactive

      - name: Deploy Functions
        if: >
          inputs.deploy_functions == true ||
          github.event_name == 'workflow_dispatch' && inputs.deploy_functions == true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only functions \
            --token "$FIREBASE_TOKEN" --non-interactive --force
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          {
            echo "### デプロイ結果"
            echo "- 管理サイト: https://kaigo-kiban-pm.web.app"
            echo "- LP: https://kaigo-lp-279.web.app"
          } >> "$GITHUB_STEP_SUMMARY"
