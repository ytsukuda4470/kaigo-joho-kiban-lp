name: 管理サイト自動デプロイ

on:
  push:
    branches: ["main"]
    paths:
      - "firebase-app/public/**"
      - "firebase.json"
      - ".firebaserc"
      - "firebase-app/firebase.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin-hosting
  cancel-in-progress: true

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Admin Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN が未設定です。GitHub Secrets に FIREBASE_TOKEN を登録してください。"
            exit 1
          fi
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:admin --token "$FIREBASE_TOKEN" --non-interactive

      - name: Summary
        if: always()
        run: |
          {
            echo "### 管理サイトデプロイ結果"
            echo "- site: kaigo-kiban-pm (hosting:admin)"
            echo "- url: https://kaigo-kiban-pm.web.app"
          } >> "$GITHUB_STEP_SUMMARY"
