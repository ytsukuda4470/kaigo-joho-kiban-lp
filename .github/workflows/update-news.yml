name: ニュース自動更新

on:
  schedule:
    # 毎週月曜 8:00 JST (= 日曜 23:00 UTC)
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "変更がなくても通知する (true/false)"
        default: "true"
        required: false

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ──────────────────────────────────────────
      # 1. チェックアウト
      # ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 100

      # ──────────────────────────────────────────
      # 2. Python セットアップ
      # ──────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # ──────────────────────────────────────────
      # 3. ニューススクレイピング & HTML 更新
      # ──────────────────────────────────────────
      - name: Run news scraper
        id: scraper
        run: |
          OUTPUT=$(python scripts/update_news.py)
          echo "$OUTPUT"
          # JSON を multiline output に保存
          {
            echo "result<<SCRAPER_EOF"
            echo "$OUTPUT"
            echo "SCRAPER_EOF"
          } >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────
      # 4. 変更があれば commit & push
      # ──────────────────────────────────────────
      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            ARTICLE_COUNT=$(echo '${{ steps.scraper.outputs.result }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('article_count',0))" 2>/dev/null || echo "?")
            git commit -m "ニュース自動更新 $(date +'%Y-%m-%d') — ${ARTICLE_COUNT}件"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────
      # 5. Firebase Hosting へ自動デプロイ（LP）
      # ──────────────────────────────────────────
      - name: Setup Node.js
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        if: steps.commit.outputs.changed == 'true'
        run: npm install -g firebase-tools

      - name: Deploy LP Hosting
        if: steps.commit.outputs.changed == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN が未設定です。GitHub Secrets に FIREBASE_TOKEN を登録してください。"
            exit 1
          fi
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:lp --token "$FIREBASE_TOKEN" --non-interactive

      # ──────────────────────────────────────────
      # 6. Google Chat 通知
      # ──────────────────────────────────────────
      - name: Send Google Chat notification
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.force_notify == 'true'
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          echo '${{ steps.scraper.outputs.result }}' | python3 scripts/notify_gchat.py

      # ──────────────────────────────────────────
      # 7. 結果サマリー
      # ──────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          CHANGED="${{ steps.commit.outputs.changed }}"
          {
            echo "### ニュース更新結果"
            if [ "$CHANGED" = "true" ]; then
              echo "✅ index.html を更新して push しました"
            else
              echo "ℹ️ 新着なし（変更なし）"
            fi
            echo ""
            echo '```json'
            echo '${{ steps.scraper.outputs.result }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
