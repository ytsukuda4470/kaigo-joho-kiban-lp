name: LP デプロイ

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-lp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy LP Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN が未設定です"
            exit 1
          fi
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:lp \
            --token "$FIREBASE_TOKEN" --non-interactive

      - name: Summary
        if: always()
        run: |
          echo "### LP デプロイ結果" >> "$GITHUB_STEP_SUMMARY"
          echo "- LP: https://kaigo-lp-279.web.app" >> "$GITHUB_STEP_SUMMARY"
