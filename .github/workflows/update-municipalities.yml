name: 自治体情報自動更新

# ──────────────────────────────────────────
# 必須シークレット設定（GitHub Secrets に登録してください）
#   FIREBASE_TOKEN : Firebase CI トークン（firebase login:ci で取得）
#   GCHAT_WEBHOOK_URL : Google Chat Webhook URL（任意）
# ──────────────────────────────────────────

on:
  schedule:
    # 毎日 JST 06:00 に実行 (= UTC 21:00 前日)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "変更がなくても強制デプロイする (true/false)"
        default: "false"
        required: false

permissions:
  contents: write

jobs:
  update-municipalities:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ──────────────────────────────────────────
      # 1. チェックアウト
      # ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 10

      # ──────────────────────────────────────────
      # 2. Python セットアップ
      # ──────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber

      # ──────────────────────────────────────────
      # 3. 自治体データ更新スクリプト実行
      # ──────────────────────────────────────────
      - name: Run municipalities updater
        id: updater
        run: |
          OUTPUT=$(python scripts/update_municipalities.py)
          echo "$OUTPUT"
          {
            echo "result<<UPDATER_EOF"
            echo "$OUTPUT"
            echo "UPDATER_EOF"
          } >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────
      # 4. 変更チェック & コミット & プッシュ
      # ──────────────────────────────────────────
      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/municipalities.json data/news.json
          if git diff --staged --quiet && [ "${{ github.event.inputs.force_deploy }}" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            NEW_COUNT=$(echo '${{ steps.updater.outputs.result }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('new_count',0))" 2>/dev/null || echo "?")
            TOTAL=$(echo '${{ steps.updater.outputs.result }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',0))" 2>/dev/null || echo "?")
            git commit -m "自治体情報自動更新 $(date +'%Y-%m-%d') — 新規${NEW_COUNT}件 / 合計${TOTAL}件" || true
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────
      # 5. Firebase Hosting へ自動デプロイ（LP）
      # ──────────────────────────────────────────
      - name: Setup Node.js
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.force_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.force_deploy == 'true'
        run: npm install -g firebase-tools

      - name: Deploy LP Hosting
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.force_deploy == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN が未設定です。GitHub Secrets に FIREBASE_TOKEN を登録してください。"
            exit 1
          fi
          firebase use kaigo-kiban-pm --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:lp --token "$FIREBASE_TOKEN" --non-interactive

      # ──────────────────────────────────────────
      # 6. Google Chat 通知（任意）
      # ──────────────────────────────────────────
      - name: Send Google Chat notification
        if: steps.commit.outputs.changed == 'true'
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          if [ -z "$GCHAT_WEBHOOK_URL" ]; then
            echo "GCHAT_WEBHOOK_URL が未設定のため通知をスキップします"
            exit 0
          fi
          echo '${{ steps.updater.outputs.result }}' | python3 scripts/notify_gchat.py || true

      # ──────────────────────────────────────────
      # 7. 結果サマリー
      # ──────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          CHANGED="${{ steps.commit.outputs.changed }}"
          {
            echo "### 自治体情報更新結果"
            if [ "$CHANGED" = "true" ]; then
              echo "✅ data/municipalities.json を更新して push しました"
            else
              echo "ℹ️ 新着なし（変更なし）"
            fi
            echo ""
            echo '```json'
            echo '${{ steps.updater.outputs.result }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
